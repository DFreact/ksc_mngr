# Честная карта контролей KESL 12.4 → векторы атак.
#
# Дисциплина оценки (без натяжек):
#   prevents   — контроль РЕАЛЬНО блокирует технику при рекомендованной настройке;
#   detects    — контроль генерирует событие, но НЕ останавливает технику;
#   partial    — покрыты лишь некоторые варианты/условия (только известное ВПО,
#                только файл на диске, только известные сигнатуры и т.п.);
#   compensating — косвенно повышает шансы обнаружения, но не таргетированный контроль.
#
# Техники без единой строки здесь — осознанные ПРОБЕЛЫ: KESL как EPP их не
# закрывает (разведка, доступ к учётным данным, sudo/setuid, сбор данных,
# кастомный C2, уничтожение бэкапов, DoS). Их видно в матрице как «нет контроля».
# Все параметры относятся к приложению KESL 12.4, category = «Параметры приложения».

# ═══ Защита от файловых угроз ════════════════════════════════════════════════

- application_name: "KESL"
  application_version: "12.4"
  category: "Параметры приложения"
  subcategory: "Защита от файловых угроз"
  group: "Наследование параметров"
  parameter_name: "Защита от файловых угроз"
  required_state: { value: true }
  coverage_strength: prevents
  threat_vector_names:
    - Фишинговое вложение в почте
    - Запуск вредоносного исполняемого файла пользователем
    - Заражение через съёмный носитель
    - Заражение общих сетевых ресурсов
  notes: >
    Проверка при обращении блокирует известный вредоносный файл в момент
    доступа — независимо от способа доставки.

- application_name: "KESL"
  application_version: "12.4"
  category: "Параметры приложения"
  subcategory: "Защита от файловых угроз"
  group: "Наследование параметров"
  parameter_name: "Защита от файловых угроз"
  required_state: { value: true }
  coverage_strength: partial
  threat_vector_names:
    - Вредоносный shell-скрипт (bash/sh)
    - Вредоносный скрипт на Python/Perl
    - Компрометация цепочки поставок ПО
    - Подмена или добавление системного бинарника
    - Упакованное или обфусцированное ВПО
    - Маскировка под легитимный процесс или файл
    - Загрузка инструментов на хост (ingress tool transfer)
    - Шифрование локальных файлов шифровальщиком
    - Скрытый майнинг криптовалюты
  notes: >
    Частично: ловит только то, что записано на диск и опознано (сигнатура/эвристика/
    KSN). Интерактивные команды, код в памяти и целевые закладки проходят.

- application_name: "KESL"
  application_version: "12.4"
  category: "Параметры приложения"
  subcategory: "Действие при обнаружении угрозы"
  group: "Исключения из проверки"
  parameter_name: "Лечить. Удалять, если лечение невозможно"
  required_state: { value: true }
  coverage_strength: prevents
  threat_vector_names:
    - Запуск вредоносного исполняемого файла пользователем
    - Фишинговое вложение в почте
  notes: >
    Автоматическая нейтрализация обнаруженного объекта — детект превращается
    в блокировку.

- application_name: "KESL"
  application_version: "12.4"
  category: "Параметры приложения"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  parameter_name: "Проверять архивы"
  required_state: { value: true }
  coverage_strength: partial
  threat_vector_names:
    - Упакованное или обфусцированное ВПО
  notes: Закрывает упаковку в архив как способ спрятать вредонос от проверки.

