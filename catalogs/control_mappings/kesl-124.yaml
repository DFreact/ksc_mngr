# ═══ Контроль целостности системы ════════════════════════════════════════════

- application_name: "KESL"
  application_version: "12.4"
  category: "Параметры приложения"
  subcategory: "Контроль безопасности"
  group: "Контроль целосстности системы"
  parameter_name: "Контроль целостности системы"
  required_state: { value: true }
  coverage_strength: detects
  threat_vector_names:
    - Закрепление через cron или systemd-таймер
    - Автозапуск через systemd-юнит или init-скрипт
    - Подмена или добавление системного бинарника
    - Вредоносный модуль ядра / руткит
    - Подмена модулей аутентификации (PAM/NSS)
    - Удаление индикаторов и очистка журналов
  notes: >
