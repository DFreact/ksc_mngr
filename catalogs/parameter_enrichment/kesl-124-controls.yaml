# Обогащение параметров KESL 12.4 — контроли безопасности.

# ─── Контроль безопасности (главные выключатели) ─────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль безопасности"
  group: "Контроль устройств"
  name: "Контроль устройств"
  description: "Управление доступом пользователей к устройствам: съёмные диски, принтеры, модемы, Bluetooth и др. — по типу устройства и шине подключения."
  purpose: "Закрывает физический вектор: занос заражения с флешки и вынос данных на съёмный носитель."
  tradeoffs_pros:
    - "Блокирует несанкционированные USB-носители — главный канал утечки и заражения в обход сети."
    - "Доверенные устройства по уникальному ID позволяют выдать доступ только корпоративным носителям."
  tradeoffs_cons:
    - "Первое включение с режимом «Запрещать» без списка доверенных заблокирует и легитимные устройства — начните с режима информирования."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль безопасности"
  group: "Контроль приложений"
  name: "Контроль прлиожений"
  description: "Управление запуском приложений по правилам: разрешающий (allowlist) или запрещающий (denylist) режим. (Опечатка в названии — из исходной таблицы.)"
  purpose: "Ограничивает исполнение постороннего кода: неизвестный бинарник просто не запустится."
  tradeoffs_pros:
    - "Allowlist-режим — одна из сильнейших мер: блокирует и вредоносные скрипты, и неизвестное ПО."
  tradeoffs_cons:
    - "Требует полной инвентаризации ПО (задача «Инвентаризация») и сопровождения правил при каждом обновлении софта."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль безопасности"
  group: "Веб-Контроль"
  name: "Веб-Контроль"
  description: "Контроль доступа пользователей к веб-ресурсам по категориям и правилам."
  purpose: "Снижает поверхность атаки через веб: сомнительные категории сайтов недоступны."
  tradeoffs_pros:
    - "Блокировка опасных категорий уменьшает вероятность drive-by-заражений и фишинга."
  tradeoffs_cons:
    - "Категоризация не идеальна — будут запросы на разблокировку легитимных сайтов."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль безопасности"
  group: "Контроль целосстности системы"
  name: "Контроль целостности системы"
  description: "Отслеживание изменений критичных файлов и каталогов относительно зафиксированного эталона (baseline)."
  purpose: "Обнаруживает закрепление атакующего: подмену системных файлов, модификацию конфигураций, руткиты."
  tradeoffs_pros:
    - "Любое несанкционированное изменение мониторируемых файлов фиксируется — ключ к обнаружению персистентности."
    - "Требование многих стандартов (PCI DSS 11.5)."
  tradeoffs_cons:
    - "Штатные обновления пакетов порождают поток событий — нужно обновлять эталон после патчей."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль безопасности"
  group: "Контроль целосстности системы"
  name: "Добавить исключения по маске"
  description: "Исключение путей по маске из мониторинга целостности (журналы, кеши, temp)."
  tradeoffs_pros:
    - "Убирает шум от файлов, меняющихся штатно."
  tradeoffs_cons:
    - "Слишком широкая маска создаст слепую зону в мониторинге."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль безопасности"
  group: "Правила доступа к устройствам"
  name: "Разрешить запрашивать временный доступ"
  description: "Пользователь может запросить временный доступ к заблокированному устройству; администратор подтверждает запрос через Web Console кодом доступа."
  tradeoffs_pros:
    - "Гибкость без ослабления политики: доступ выдаётся точечно и на время."
  tradeoffs_cons:
    - "Требует KSC и досягаемости Сервера администрирования с устройства."

# ─── Контроль приложений: режим и действие ───────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при запуске приложений"
  group: "Режим работы"
  name: "Блокировать все, не указанное в списке правил"
  description: "Allowlist: запуск разрешён только приложениям из списка правил, всё остальное блокируется."
  tradeoffs_pros:
    - "Максимальная строгость: неизвестное вредоносное ПО не запустится в принципе."
  tradeoffs_cons:
    - "Любое не внесённое в правила легитимное приложение перестанет запускаться — внедряйте после инвентаризации и пилота в режиме «Информировать»."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при запуске приложений"
  group: "Режим работы"
  name: "Разрешать все, не указанное в списке правил"
  description: "Denylist: запуск разрешён всем, кроме приложений из запрещающих правил."
  tradeoffs_pros:
    - "Не мешает работе — подходит как первый этап внедрения контроля."
  tradeoffs_cons:
    - "Защищает только от известного и внесённого в список — новое вредоносное ПО пройдёт."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при запуске приложений"
  group: "Действие"
  name: "Применять правила"
  description: "Правила контроля приложений применяются принудительно: запрещённые запуски блокируются."
  tradeoffs_pros:
    - "Единственный режим, дающий реальную защиту (а не только журнал)."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при запуске приложений"
  group: "Действие"
  name: "Информировать"
  description: "Тестовый режим: нарушения правил фиксируются в журнале, запуск не блокируется."
  tradeoffs_pros:
    - "Обязательный этап пилота: показывает, что сломалось бы при включении блокировки."
  tradeoffs_cons:
    - "Защиты нет — только телеметрия."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при запуске приложений"
  group: "Действие"
  name: "Добавить правила из политики к локальным правилам"
  description: "Правила из политики KSC объединяются с локально созданными на устройстве, а не заменяют их."
  tradeoffs_cons:
    - "Локальные правила могут ослаблять центральную политику — проверяйте их при аудите."

# ─── Веб-Контроль: режим списка правил ───────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Веб-Контроль"
  group: "Список правил"
  name: "Блокировать все, не указанное в списке правил"
  description: "Строгий режим: доступ только к явно разрешённым веб-ресурсам."
  tradeoffs_pros:
    - "Максимальное сужение веб-поверхности — типично для серверов и киосков."
  tradeoffs_cons:
    - "Для рабочих станций практически всегда слишком строго."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Веб-Контроль"
  group: "Список правил"
  name: "Разрешать все, не указанное в списке правил"
  description: "Мягкий режим: доступ открыт, блокируются только ресурсы из запрещающих правил."
  tradeoffs_pros:
    - "Баланс для рабочих станций: блокируются только явно нежелательные категории."

# ─── Контроль устройств: правила и шаблоны ───────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Правила доступа к устройствам"
  group: "Режим работы"
  name: "Блокировать"
  description: "Правила доступа к устройствам применяются принудительно: запрещённые устройства блокируются."
  tradeoffs_pros:
    - "Реальная защита канала съёмных носителей."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Правила доступа к устройствам"
  group: "Режим работы"
  name: "Информировать"
  description: "Тестовый режим: подключения фиксируются в журнале, доступ не блокируется."
  tradeoffs_pros:
    - "Позволяет собрать инвентарь реально используемых устройств до включения блокировки."
  tradeoffs_cons:
    - "Защиты нет — только учёт."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Контроль устройств"
  group: "Шаблоны сообщений"
  name: "Сообщение о блокировке устройства"
  description: "Текст, который видит пользователь при блокировке устройства (обычно содержит порядок запроса доступа)."
  tradeoffs_pros:
    - "Понятное сообщение с контактом администратора снижает поток обращений в поддержку."
