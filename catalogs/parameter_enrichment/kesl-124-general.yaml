# Обогащение параметров KESL 12.4 — общие настройки, сеть, ОС, KSC, хранилища.

# ─── Наследование (категория «Общие») ────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: null
  group: "Наследование параметров"
  name: "Наследовать параметр родительской политики"
  description: "Политика принимает значения заблокированных (замочком) параметров родительской политики группы."
  tradeoffs_pros:
    - "Центральные требования безопасности гарантированно доходят до всех вложенных групп."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: null
  group: "Наследование параметров"
  name: "Обеспечить принудительное наследование параметров для дочерних политик"
  description: "Дочерние политики не могут отключить наследование заблокированных параметров этой политики."
  tradeoffs_pros:
    - "Администратор группы не сможет ослабить обязательные параметры головной политики."
  tradeoffs_cons:
    - "Исключения для особых групп придётся оформлять отдельными политиками, а не переопределением."

# ─── Доверенная зона ─────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Доверенная зона"
  group: "Исключения из Поиска вредоносного ПО"
  name: "Объединять значения при наследовании"
  description: "Исключения из проверки в этой политике добавляются к унаследованным, а не заменяют их."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Доверенная зона"
  group: "Доверенные приложения"
  name: "Объединять значения при наследовании"
  description: "Доверенные приложения этой политики добавляются к унаследованным, а не заменяют их."

# ─── Интеграция с KSC: передача данных ───────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Интеграция с KSC"
  group: "Передача данных на Сервер администрирования"
  name: "О файлах карантина"
  description: "Сведения о файлах в карантине передаются в KSC — видны в консоли, можно управлять централизованно."
  tradeoffs_pros:
    - "Разбор карантина всего парка из одной консоли."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Интеграция с KSC"
  group: "Передача данных на Сервер администрирования"
  name: "О файлах в резервном хранилище"
  description: "Сведения о резервных копиях объектов (созданных перед лечением/удалением) передаются в KSC."
  tradeoffs_pros:
    - "Восстановление ложно удалённого файла — прямо из консоли KSC."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Интеграция с KSC"
  group: "Передача данных на Сервер администрирования"
  name: "О необработанных файлах"
  description: "Сведения о файлах, с которыми не удалось выполнить действие (лечение/удаление), передаются в KSC."
  tradeoffs_pros:
    - "Администратор видит хвост необработанных угроз по всему парку."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Интеграция с KSC"
  group: "Передача данных на Сервер администрирования"
  name: "О запускаемых приложениях"
  description: "Инвентарь запускаемых приложений передаётся в KSC — основа для правил Контроля приложений."
  tradeoffs_pros:
    - "Без этих данных невозможно построить allowlist Контроля приложений."
  tradeoffs_cons:
    - "Заметный объём данных с большого парка; растёт БД Сервера администрирования."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Интеграция с KSC"
  group: "Передача данных на Сервер администрирования"
  name: "Об установленных устройствах"
  description: "Инвентарь подключаемых устройств передаётся в KSC — основа для правил Контроля устройств и выдачи доверенных ID."
  tradeoffs_pros:
    - "Уникальные ID устройств для списка доверенных берутся именно из этого инвентаря."

# ─── Настройки взаимодействия с ОС ───────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Механизм перехвата"
  name: "Обновляемый модуль ядра"
  description: "Перехват файловых операций собственным модулем ядра Kaspersky — самый полный контроль обращений к файлам."
  tradeoffs_pros:
    - "Максимальная полнота перехвата, включая операции, невидимые для fanotify."
  tradeoffs_cons:
    - "Модуль должен собираться под конкретное ядро; после обновления ядра возможна пересборка. На части ядер недоступен."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Механизм перехвата событий"
  name: "Технология fanotify"
  description: "Перехват файловых операций штатным механизмом ядра Linux fanotify — без стороннего модуля ядра."
  tradeoffs_pros:
    - "Работает на любом современном ядре без пересборки — стабильность при обновлениях ОС."
  tradeoffs_cons:
    - "Покрытие уже, чем у модуля ядра (не все типы операций перехватываются)."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Если обновляемый модуль ядра не запускается"
  name: "Использовать технологию fanotify"
  description: "Резервный вариант: если модуль ядра не собрался/не загрузился — автоматически перейти на fanotify."
  tradeoffs_pros:
    - "Защита сохраняется после обновления ядра, даже если модуль ещё не пересобран."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Если обновляемый модуль ядра не запускается"
  name: "Выключать перехват с системных событий(снижение уровня защиты)"
  description: "Если модуль ядра недоступен — перехват отключается полностью, файловая защита в реальном времени не работает."
  tradeoffs_cons:
    - "После обновления ядра хост может остаться без файловой защиты — используйте только с мониторингом событий об отключении."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Источник телеметрии"
  name: "По умолчанию"
  description: "Источник телеметрии для поведенческого анализа выбирается автоматически (auditd или eBPF в зависимости от системы)."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Источник телеметрии"
  name: "Использовать только eBPF"
  description: "Телеметрия процессов собирается только через eBPF, auditd не задействуется."
  tradeoffs_pros:
    - "Не конфликтует с корпоративным использованием auditd (SIEM-агенты и т.п.)."
  tradeoffs_cons:
    - "Требует ядро с поддержкой eBPF (4.15+); на старых системах недоступно."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Режим работы auditd"
  name: "Монопольный"
  description: "KESL забирает auditd в единоличное использование — другие потребители аудита отключаются."
  tradeoffs_pros:
    - "Гарантированная полнота телеметрии для Анализа поведения."
  tradeoffs_cons:
    - "Конфликтует с SIEM-агентами и скриптами, читающими auditd, — они перестанут получать события."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки взаимодействия с ОС"
  group: "Режим работы auditd"
  name: "Режим многоадресной рассылки"
  description: "KESL получает события auditd параллельно с другими потребителями (multicast)."
  tradeoffs_pros:
    - "Совместимость: SIEM-агенты продолжают работать."
  tradeoffs_cons:
    - "Небольшой риск потери событий при пиковой нагрузке аудита."

# ─── Настройки сети ──────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки сети"
  group: "Контролируемые порты"
  name: "Контролировать все сетевые порты"
  description: "Сетевые защитные компоненты инспектируют трафик всех портов."
  tradeoffs_pros:
    - "Нестандартный порт не спрячет вредоносный трафик от проверки."
  tradeoffs_cons:
    - "Максимальная нагрузка на инспекцию; на высоконагруженных серверах оцените влияние."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки сети"
  group: "Контролируемые порты"
  name: "Контролировать только выбранные сетевые порты"
  description: "Инспектируется трафик только перечисленных портов (по умолчанию — список типовых портов приложений)."
  tradeoffs_pros:
    - "Существенно меньше накладных расходов."
  tradeoffs_cons:
    - "Трафик на нестандартных портах не проверяется — известный способ обхода."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки сети"
  group: "Режим перехвата трафика"
  name: "iptables"
  description: "Перехват сетевого трафика через правила iptables/netfilter."
  tradeoffs_pros:
    - "Работает на любых ядрах, предсказуемое поведение."
  tradeoffs_cons:
    - "Вмешивается в таблицы netfilter — учитывайте при сложных ручных конфигурациях сети."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Настройки сети"
  group: "Режим перехвата трафика"
  name: "eBPF"
  description: "Перехват сетевого трафика через eBPF — без модификации правил netfilter."
  tradeoffs_pros:
    - "Не трогает iptables: чище для хостов с собственным файрволом/оркестрацией (k8s)."
  tradeoffs_cons:
    - "Требует современное ядро с поддержкой eBPF."

# ─── Общие настройки ─────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Kaspersky Security Network"
  name: "Kaspersky Security Network"
  description: "Участие в облачной сети KSN: репутация файлов и URL проверяется по глобальной базе Kaspersky в реальном времени."
  purpose: "Сокращает окно уязвимости: новая угроза, обнаруженная где-либо в мире, блокируется у вас через минуты, а не после обновления баз."
  tradeoffs_pros:
    - "Реакция на новые угрозы за минуты вместо часов."
    - "Меньше ложных срабатываний за счёт репутации легитимных файлов."
  tradeoffs_cons:
    - "Наружу передаются метаданные проверяемых объектов (хеши, URL) — в закрытых контурах используйте KPSN/прокси KSN."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Kaspersky Security Network"
  name: "Использовать расширенный режим KSN"
  description: "В KSN передаётся расширенная статистика (сведения об угрозах и активности) — улучшает качество глобальной детектирующей базы."
  tradeoffs_cons:
    - "Больше передаваемых данных — согласуйте с политикой конфиденциальности организации."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Kaspersky Security Network"
  name: "Использовать облачный режим"
  description: "Облегчённые локальные базы: часть вердиктов запрашивается из облака KSN, а не хранится локально."
  tradeoffs_pros:
    - "Меньше диск/память под базы, быстрее обновления."
  tradeoffs_cons:
    - "При потере связи с KSN полнота детекта снижается до локальных баз."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Прокси-сервер KSN"
  name: "Использовать сервер администрирования как прокси-сервер KSN"
  description: "Запросы KSN идут через KSC (KSN Proxy), а не напрямую в интернет с каждого хоста."
  tradeoffs_pros:
    - "Хостам не нужен прямой выход в интернет; общий кеш вердиктов снижает трафик."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Прокси-сервер KSN"
  name: "Использовать серверы Kaspersky Security Network, если прокси-сервер KSN недоступен"
  description: "При недоступности KSN-прокси хост обращается к облаку KSN напрямую."
  tradeoffs_pros:
    - "Облачная защита сохраняется при сбое KSC."
  tradeoffs_cons:
    - "Требует прямой доступ хостов в интернет — в закрытых контурах обычно запрещено."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Настройки сети"
  name: "Проверка защищенных соединений"
  description: "Расшифровка и проверка HTTPS/TLS-трафика (MITM с локальным сертификатом) для Веб-защиты и Веб-Контроля."
  tradeoffs_pros:
    - "Без неё веб-защита видит только HTTP — а почти весь вредоносный трафик сегодня в TLS."
  tradeoffs_cons:
    - "Вмешательство в TLS: возможны проблемы с certificate pinning отдельных приложений — добавляйте их в исключения."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Настройки сети"
  name: "Использовать прокси-сервер"
  description: "Доступ приложения к внешним ресурсам (обновления, KSN) через корпоративный прокси."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Исключения для прокси-сервера"
  name: "Kata Sandbox"
  description: "Трафик интеграции с KATA Sandbox идёт напрямую, минуя прокси."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Исключения для прокси-сервера"
  name: "Network Detection and Response(KATA)"
  description: "Трафик интеграции с KATA NDR идёт напрямую, минуя прокси."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Исключения для прокси-сервера"
  name: "Endpoint Detection and Response Expert(on-premise)"
  description: "Трафик интеграции с KEDR Expert (on-premise) идёт напрямую, минуя прокси."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Взаимодействие с пользователем"
  name: "Доступ к локальным задачам"
  description: "Локальному пользователю разрешено управлять задачами KESL на устройстве (запуск/остановка через kesl-control)."
  tradeoffs_cons:
    - "Пользователь сможет останавливать проверки — для строго управляемых сред отключите."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Взаимодействие с пользователем"
  name: "Управление групповыми задачами"
  description: "Локальному пользователю разрешено управлять групповыми задачами, назначенными из KSC."
  tradeoffs_cons:
    - "Пользователь сможет мешать централизованным операциям — обычно выключено."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Взаимодействие с пользователем"
  name: "Максимальное время ожидания запуска приложения (мин.)"
  description: "Максимальное время ожидания старта приложения при загрузке системы до фиксации ошибки."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Взаимодействие с пользователем"
  name: "Максимальное количество неудачных последовательных попыток запуска приложения"
  description: "После указанного числа неудачных стартов подряд фиксируется отказ функционирования (событие в KSC)."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Интеграция с KSC"
  name: "Передача данных на Сервер администрирования"
  description: "Главный выключатель передачи данных (карантин, хранилище, инвентарь) в KSC."
  tradeoffs_cons:
    - "Отключение ослепит консоль: хост останется управляемым, но без детальных данных."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Интеграция с KSC"
  name: "Использовать Kaspersky Security Center в качестве прокси-сервера для активации"
  description: "Активация лицензии через KSC — хостам не нужен прямой доступ к серверам активации Kaspersky."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Настройки записи событий в журнал"
  name: "Сообщать о незараженных объектах"
  description: "Журналировать каждый проверенный чистый объект."
  tradeoffs_cons:
    - "Огромный объём журнала; включайте только для отладки."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Настройки записи событий в журнал"
  name: "Сообщать о необработанных объектах"
  description: "Журналировать объекты, к которым не удалось применить действие (заняты, нет прав и т.п.)."
  tradeoffs_pros:
    - "Видимость «хвоста» пропущенных объектов — важно для аудита полноты защиты."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Настройки записи событий в журнал"
  name: "Сообщать об упакованных объектах"
  description: "Журналировать обнаруженные упакованные/запароленные объекты, которые не удалось распаковать для проверки."
  tradeoffs_pros:
    - "Запароленные архивы — типичный контейнер доставки зловреда; события помогают их отслеживать."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Общие настройки"
  group: "Обнаружение других типов объектов"
  name: "Легальные приложения, которые могут быть использованы злоумышленниками для нанесения вреда компьютеру или данным пользователя"
  description: "Детект riskware: легальные инструменты двойного назначения (удалённый доступ, снифферы, майнеры, инструменты дампа паролей)."
  tradeoffs_pros:
    - "Обнаруживает инструментарий атакующего (AnyDesk на сервере, mimikatz-аналоги), даже если это «легальный» софт."
  tradeoffs_cons:
