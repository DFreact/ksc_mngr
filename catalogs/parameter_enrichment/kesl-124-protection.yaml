# Обогащение параметров KESL 12.4 — защитные компоненты.
# Описания и влияние на защиту/производительность — по официальной документации
# KESL 12.x (support.kaspersky.ru/kes-for-linux/12.4.0).
# Ключ сопоставления: subcategory + group + name (точно как в kesl_parameters.yaml).

# ─── Защита от файловых угроз ────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от файловых угроз"
  group: "Наследование параметров"
  name: "Защита от файловых угроз"
  description: "Главный выключатель постоянной защиты файловой системы: каждый открываемый, сохраняемый и запускаемый файл проверяется в реальном времени."
  purpose: "Основной защитный компонент KESL — первая линия обороны от вредоносных файлов."
  tradeoffs_pros:
    - "Блокирует вредоносный файл в момент обращения — до его исполнения."
    - "Закрывает основные векторы: заражённые файлы из почты, сети, съёмных носителей."
  tradeoffs_cons:
    - "Перехват каждой файловой операции добавляет накладные расходы на I/O; на файловых серверах с интенсивной нагрузкой настраивайте исключения."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от файловых угроз"
  group: "Исключения из проверки"
  name: "Объединять значения при наследовании"
  description: "Список исключений этой политики добавляется к унаследованному от родительской политики, а не заменяет его."
  tradeoffs_pros:
    - "Дочерние группы дополняют общий корпоративный список исключений своими, не теряя базовые."
  tradeoffs_cons:
    - "Итоговый список не виден целиком в одной политике — при разборе инцидентов сверяйте всю цепочку наследования."

# ─── Действие при обнаружении угрозы (файловая защита) ───────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при обнаружении угрозы"
  group: "Исключения из проверки"
  name: "Лечить. Удалять, если лечение невозможно"
  description: "Приложение пытается вылечить заражённый файл; если лечение невозможно — файл удаляется (копия помещается в резервное хранилище)."
  purpose: "Рекомендуемый режим: угроза гарантированно нейтрализуется, оригинал восстановим из хранилища."
  tradeoffs_pros:
    - "Угроза устраняется автоматически, без участия администратора."
  tradeoffs_cons:
    - "Ложное срабатывание приведёт к удалению рабочего файла — восстановление только из резервного хранилища."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при обнаружении угрозы"
  group: "Исключения из проверки"
  name: "Лечить. Блокировать, если лечение невозможно"
  description: "Приложение пытается вылечить файл; если не удаётся — доступ к файлу блокируется, но файл остаётся на диске."
  tradeoffs_pros:
    - "Файл не уничтожается — безопаснее при риске ложных срабатываний на критичных данных."
  tradeoffs_cons:
    - "Заражённый файл остаётся на диске и требует ручной обработки."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Действие при обнаружении угрозы"
  group: "Исключения из проверки"
  name: "Блокировать"
  description: "Доступ к заражённому файлу блокируется без попытки лечения и без удаления."
  tradeoffs_pros:
    - "Максимально консервативно: никакие данные не изменяются."
  tradeoffs_cons:
    - "Угрозы копятся на диске; нужен регулярный разбор заблокированных объектов."

# ─── Дополнительные настройки (проверка) ─────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  name: "Проверять архивы"
  description: "Распаковка и проверка содержимого архивов (zip, tar, rar и др.) при доступе."
  tradeoffs_pros:
    - "Обнаруживает вредоносное ПО, спрятанное в архивах, — типичный способ обхода защиты."
  tradeoffs_cons:
    - "Распаковка ресурсоёмка: заметно замедляет операции с большими архивами. На нагруженных серверах угроза в архиве неактивна до распаковки — её поймает проверка при извлечении."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  name: "Проверять дистрибуктивы и самораспаковывающиеся архивы"
  description: "Проверка установочных пакетов и SFX-архивов, которые распаковывают себя сами при запуске."
  tradeoffs_pros:
    - "SFX-архив исполняется без внешнего архиватора — заражённый дистрибутив сработает при запуске, поэтому проверка до запуска критична."
  tradeoffs_cons:
    - "Незначительное замедление при работе с установщиками."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  name: "Проверять файлы почтовых форматов(1)"
  description: "Проверка файлов почтовых баз и сообщений (mbox, eml и др.) при обращении к ним."
  tradeoffs_pros:
    - "Ловит вредоносные вложения в локально сохранённой почте."
  tradeoffs_cons:
    - "Почтовые базы велики — проверка может замедлять почтовые клиенты."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  name: "Проверять файлы почтовых форматов(2)"
  description: "Дублирующий флаг проверки почтовых форматов из исходной таблицы (второй столбец Excel). Уточните назначение по своей консоли."
  tradeoffs_cons:
    - "Строка-дубль из исходной таблицы — сверьте с консолью, какой из двух флагов действует."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  name: "Не проверять архивы размером более(МБ):"
  description: "Архивы больше указанного размера пропускаются без проверки."
  tradeoffs_pros:
    - "Отсекает самые тяжёлые операции распаковки — основной выигрыш производительности."
  tradeoffs_cons:
    - "Создаёт слепую зону: злоумышленнику достаточно раздуть архив выше порога."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Производительность"
  name: "Пропускать файл, если его проверка длится более(сек.)"
  description: "Ограничение времени проверки одного файла: по истечении лимита файл пропускается непроверенным."
  tradeoffs_pros:
    - "Гарантирует, что защита не подвесит работу с аномально сложными файлами."
  tradeoffs_cons:
    - "Пропущенный по тайм-ауту файл не проверен — событие фиксируется в журнале, отслеживайте его частоту."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Настройки проверки"
  name: "Проверять вложенные архивы"
  description: "Рекурсивная проверка архивов внутри архивов."
  tradeoffs_pros:
    - "Многослойная упаковка — классический способ спрятать зловред от антивируса."
  tradeoffs_cons:
    - "Экспоненциальный рост времени проверки с глубиной вложенности; возможны «архивные бомбы»."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Настройки проверки"
  name: "Проверять файлы офисных форматов"
  description: "Проверка документов Office/OpenDocument, включая встроенные макросы и OLE-объекты."
  tradeoffs_pros:
    - "Макросы в документах — один из главных векторов доставки (фишинговые вложения)."
  tradeoffs_cons:
    - "Небольшое замедление открытия офисных документов."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Настройки проверки"
  name: "Не проверять архивы размером более(МБ):"
  description: "Порог размера архива для задач проверки (аналог одноимённого параметра в группе «Производительность», но для проверок по требованию)."
  tradeoffs_cons:
    - "Слепая зона по крупным архивам в проверках по требованию."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Настройки проверки"
  name: "Пропускать файл, если его проверка длится более(сек.):"
  description: "Тайм-аут проверки одного файла в задачах проверки по требованию."
  tradeoffs_cons:
    - "Файлы, пропущенные по тайм-ауту, остаются непроверенными."

# ─── Фильтр вложений (почтовая защита) ───────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Фильтр вложений"
  name: "Не изменять вложения"
  description: "Фильтр вложений отключён: письма проходят с вложениями как есть (проверка на вирусы всё равно выполняется)."
  tradeoffs_cons:
    - "Опасные типы вложений (исполняемые файлы, скрипты) доходят до пользователей."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Фильтр вложений"
  name: "Переименовывать вложения указанных типов"
  description: "Вложения из списка масок (например *.exe, *.js) переименовываются — расширение ломается, файл не запустится двойным кликом."
  tradeoffs_pros:
    - "Пользователь не запустит опасное вложение случайно, но файл можно восстановить при необходимости."
  tradeoffs_cons:
    - "Легитимные файлы этих типов придётся переименовывать вручную."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Дополнительные настройки"
  group: "Фильтр вложений"
  name: "Удалять вложения указанных типов"
  description: "Вложения из списка масок удаляются из писем безвозвратно."
  tradeoffs_pros:
    - "Самая жёсткая отсечка вектора «вредонос во вложении» — файл не доходит вообще."
  tradeoffs_cons:
    - "Восстановить удалённое вложение нельзя; согласуйте список масок с бизнес-процессами."

# ─── Режим перехвата файловых операций ───────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Режим перехвата файловых операций"
  group: "Производительность"
  name: "Блокировать доступ к файлам во времям проверки"
  description: "Синхронный режим: процесс ждёт окончания проверки файла и получает доступ только к проверенному файлу."
  purpose: "Определяет фундаментальный компромисс защиты: ждать проверку (надёжно) или не ждать (быстро)."
  tradeoffs_pros:
    - "Гарантия: невозможно исполнить непроверенный файл — окно гонки закрыто."
  tradeoffs_cons:
    - "Каждое открытие файла ждёт проверку — ощутимая задержка на медленных дисках и больших файлах. Асинхронный режим быстрее, но допускает короткое окно между доступом и вердиктом."

# ─── Защита сетевых соединений (почта/веб/сеть) ──────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Защита от почтовых угроз"
  name: "Защита от почтовых угроз"
  description: "Проверка входящих и исходящих сообщений почтовых протоколов на вирусы и фишинг. Новый компонент KESL 12.4."
  purpose: "Почтовые вложения — вектор №1 первичного заражения; компонент закрывает его до сохранения файла на диск."
  tradeoffs_pros:
    - "Вредоносное вложение и фишинговая ссылка перехватываются на уровне протокола, до клика пользователя."
  tradeoffs_cons:
    - "Проверка трафика добавляет задержку при получении больших писем."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Уровень безопасности"
  name: "Рекомендуемый"
  description: "Сбалансированный предустановленный уровень: оптимальное соотношение полноты проверки и скорости (рекомендация «Лаборатории Касперского»)."
  tradeoffs_pros:
    - "Выверенный производителем баланс — разумный выбор по умолчанию для большинства систем."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Уровень безопасности"
  name: "Максимальная защита"
  description: "Самый строгий предустановленный уровень: глубокая эвристика, проверка всех типов объектов."
  tradeoffs_pros:
    - "Максимальная полнота обнаружения — для критичных сегментов (серверы с чувствительными данными, DMZ)."
  tradeoffs_cons:
    - "Наибольшая нагрузка на CPU и задержки трафика; выше вероятность ложных срабатываний."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Уровень безопасности"
  name: "Максимальное быстродействие"
  description: "Облегчённый уровень: проверяются только наиболее опасные типы объектов, минимальная эвристика."
  tradeoffs_pros:
    - "Минимальное влияние на производительность — для нагруженных серверов при наличии других слоёв защиты."
  tradeoffs_cons:
    - "Часть угроз (редкие форматы, глубоко упакованные объекты) может пройти мимо."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Действие при обнаружении угрозы"
  name: "Лечить. Удалять, если лечение невозможно"
  description: "Заражённый объект в трафике лечится; при невозможности — удаляется из сообщения/потока."
  tradeoffs_pros:
    - "Угроза не доходит до пользователя ни в каком виде."
  tradeoffs_cons:
    - "Ложное срабатывание уничтожит легитимное вложение."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Действие при обнаружении угрозы"
  name: "Лечить. Блокировать, если лечение невозможно"
  description: "Объект лечится; при невозможности — доставка блокируется, объект сохраняется для разбора."
  tradeoffs_pros:
    - "Данные не уничтожаются — восстановимы после разбора инцидента."
  tradeoffs_cons:
    - "Заблокированные объекты требуют ручной обработки."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита сетевых соединений и средств коммуникации"
  group: "Действие при обнаружении угрозы"
  name: "Блокировать"
  description: "Передача заражённого объекта блокируется без лечения."
  tradeoffs_cons:
    - "Пользователь не получает объект целиком, даже если лечение было возможно."

# ─── Защита от веб-угроз ─────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от веб-угроз"
  group: "Фильтр вложений"
  name: "Защита от веб-угроз"
  description: "Проверка HTTP/HTTPS/FTP-трафика: блокировка загрузки вредоносных файлов и доступа к фишинговым и опасным сайтам."
  purpose: "Закрывает drive-by-загрузки и фишинг — второй по частоте вектор первичного заражения."
  tradeoffs_pros:
    - "Вредоносный файл блокируется ещё в трафике, до записи на диск."
    - "Фишинговые URL блокируются по базе Kaspersky и эвристике."
  tradeoffs_cons:
    - "Проверка трафика добавляет задержку загрузки; для HTTPS требуется проверка защищённых соединений (см. Общие настройки)."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от веб-угроз"
  group: "Действие при обнаружении угрозы"
  name: "Блокировать"
  description: "Загрузка вредоносного объекта или открытие опасного URL блокируется."
  tradeoffs_pros:
    - "Единственный режим, реально прерывающий атаку через веб."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от веб-угроз"
  group: "Действие при обнаружении угрозы"
  name: "Информировать"
  description: "Обнаружение фиксируется в журнале, но загрузка не блокируется (режим мониторинга)."
  tradeoffs_pros:
    - "Полезно на этапе пилота для оценки ложных срабатываний."
  tradeoffs_cons:
    - "Защиты нет — угроза проходит; только след в журнале."

# ─── Защита от сетевых угроз ─────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от сетевых угроз"
  group: "Защита от сетевых угроз"
  name: "Защита от сетевых угроз"
  description: "Анализ входящего трафика на сигнатуры сетевых атак (эксплойты сетевых служб, сканирование портов, флуд)."
  purpose: "Обнаруживает и пресекает попытки удалённой эксплуатации сервисов устройства."
  tradeoffs_pros:
    - "Перехватывает атаку на сетевом уровне — до того, как уязвимая служба получит вредоносный пакет."
  tradeoffs_cons:
    - "Инспекция трафика добавляет небольшую задержку; на системах с очень высоким PPS оцените нагрузку."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от сетевых угроз"
  group: "Действие при обнаружении угрозы"
  name: "Блокировать"
  description: "Соединение, в котором обнаружена атака, разрывается."
  tradeoffs_pros:
    - "Атака прерывается немедленно."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от сетевых угроз"
  group: "Действие при обнаружении угрозы"
  name: "Блокировать атаку и атакующие устройства на (мин):"
  description: "Помимо разрыва соединения, IP-адрес атакующего блокируется целиком на указанное время."
  tradeoffs_pros:
    - "Пресекает серию повторных попыток с того же хоста — типично для перебора и сканирования."
  tradeoffs_cons:
    - "Ложное срабатывание отрежет легитимный хост (например, сканер мониторинга) на всё время блокировки — добавьте такие хосты в исключения."

# ─── Сетевой экран ───────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Сетевой экран"
  group: "Действие при обнаружении угрозы"
  name: "Сетевой экран"
  description: "Управление сетевым экраном ОС: KESL применяет заданные пакетные правила и правила сетей поверх netfilter/iptables."
  purpose: "Централизованное управление межсетевым экраном всех Linux-хостов из KSC вместо ручного iptables."
  tradeoffs_pros:
    - "Единые сетевые правила фильтрации на весь парк из одной политики."
    - "Сегментация снижает поверхность атаки и ограничивает боковое перемещение."
  tradeoffs_cons:
    - "KESL перезаписывает локальные правила iptables — существующие ручные конфигурации будут заменены политикой."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Сетевые пакетные правила"
  group: "Дополнительные настройки"
  name: "Всегда добавлять разрешающие правила для портов Агента администрирования"
  description: "Автоматически создаёт разрешающие правила для портов связи Агента с KSC, чтобы политика сетевого экрана не оборвала управление."
  tradeoffs_pros:
    - "Защита от самоблокировки: даже ошибочная политика не отрежет хост от KSC."
  tradeoffs_cons:
    - "Порты агента открыты всегда — учитывайте в модели угроз (компенсируется контролем адресов KSC)."

# ─── Защита от шифрования ────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от шифрования"
  group: "Действия при обнаружении угрозы"
  name: "Защита от шифрования"
  description: "Мониторинг обращений удалённых устройств к общим папкам (SMB/NFS): обнаружение паттерна массового шифрования файлов."
  purpose: "Анти-шифровальщик для файловых серверов: останавливает ransomware, шифрующий сетевые папки с заражённой машины."
  tradeoffs_pros:
    - "Ловит шифровальщика по поведению — работает и против новых, неизвестных образцов."
    - "Критично для файловых серверов: одна заражённая рабочая станция не уничтожит общие данные."
  tradeoffs_cons:
    - "Имеет смысл только на хостах с общими папками; мониторинг операций добавляет небольшую нагрузку на I/O."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от шифрования"
  group: "Действие при обнаружении угрозы"
  name: "Блокировать соединение на (мин):"
  description: "Хост, с которого идёт массовое шифрование, теряет доступ к общим папкам на указанное время."
  tradeoffs_pros:
    - "Шифрование останавливается за секунды — потери ограничиваются десятками файлов вместо всего тома."
  tradeoffs_cons:
    - "Ложное срабатывание (массовое легитимное переименование/конвертация) заблокирует рабочую станцию."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от шифрования"
  group: "Действие при обнаружении угрозы"
  name: "Информировать"
  description: "Обнаружение шифрования фиксируется, но соединение не блокируется."
  tradeoffs_cons:
    - "Шифровальщик продолжит работу — за время реакции администратора данные будут потеряны."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от шифрования"
  group: "Область защиты"
  name: "Все общие сетевые папки защищаемого устройства"
  description: "Мониторинг всех каталогов, опубликованных по SMB/NFS."
  tradeoffs_pros:
    - "Новые общие папки защищаются автоматически, без правки политики."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от шифрования"
  group: "Область защиты"
  name: "Только указанные общие папки"
  description: "Мониторинг только перечисленных в списке каталогов."
  tradeoffs_pros:
    - "Меньше нагрузка, если общих папок много, а критичных — единицы."
  tradeoffs_cons:
    - "Новая общая папка не защищена, пока её не внесли в список."

# ─── Защита от эксплойтов ────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от эксплойтов"
  group: "Область защиты"
  name: "Защита от эксплойтов"
  description: "Контроль попыток эксплуатации уязвимостей в запущенных процессах. ВНИМАНИЕ: в официальном списке компонентов KESL 12.4 этот компонент отсутствует (есть в KES для Windows) — сверьте строку с вашей консолью."
  tradeoffs_pros:
    - "Перекрывает эксплуатацию ещё не закрытых уязвимостей (защита до патча)."
  tradeoffs_cons:
    - "Происхождение строки в исходной таблице не подтверждено документацией KESL — возможно, относится к другому продукту."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от эксплойтов"
  group: "Действие при обнаружении угрозы"
  name: "Блокировать"
  description: "Эксплуатирующая операция блокируется, процесс останавливается."
  tradeoffs_pros:
    - "Эксплойт прерывается до получения контроля над процессом."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от эксплойтов"
  group: "Действие при обнаружении угрозы"
  name: "Информировать или запросить действие"
  description: "Событие фиксируется; действие выбирает администратор."
  tradeoffs_cons:
    - "Между событием и реакцией администратора эксплойт продолжает исполняться."

# ─── Анализ поведения ────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Анализ поведения"
  group: "Авторизация USB-устройств"
  name: "Анализ поведения"
  description: "Мониторинг активности процессов по сигнатурам опасного поведения (BSS): выявляет вредоносную активность независимо от сигнатур файлов."
  purpose: "Поведенческий слой защиты: ловит то, что прошло мимо файловых сигнатур — новые образцы, бесфайловые атаки."
  tradeoffs_pros:
    - "Обнаруживает неизвестное вредоносное ПО по действиям, а не по хешу."
    - "Ключевой компонент против шифровальщиков и руткитов на локальной машине."
  tradeoffs_cons:
    - "Постоянный мониторинг системных вызовов добавляет фоновую нагрузку на CPU."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Анализ поведения"
  group: "Действия при обнаружении угрозы"
  name: "Блокировать"
  description: "Процесс с опасным поведением завершается принудительно."
  tradeoffs_pros:
    - "Вредоносная активность прерывается автоматически в момент обнаружения."
  tradeoffs_cons:
    - "Ложное срабатывание завершит легитимный процесс — добавляйте проверенное ПО в доверенные приложения."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Анализ поведения"
  group: "Действия при обнаружении угрозы"
  name: "Информировать"
  description: "Опасное поведение фиксируется в журнале, процесс продолжает работу."
  tradeoffs_cons:
    - "Режим наблюдения: вредоносный процесс не останавливается."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Анализ поведения"
  group: "Доверенные приложения"
  name: "Объединять значения при наследовании"
  description: "Список доверенных приложений политики добавляется к унаследованному, а не заменяет его."

# ─── Защита от атак BadUSB ───────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от атак BadUSB"
  group: "Производительность"
  name: "Защита от атак BadUSB"
  description: "Защита от USB-устройств, выдающих себя за клавиатуру: каждая новая «клавиатура» должна быть авторизована вводом числового кода."
  purpose: "BadUSB — атака, при которой перепрошитая флешка регистрируется как клавиатура и вводит команды от имени пользователя."
  tradeoffs_pros:
    - "Полностью закрывает класс атак BadUSB/Rubber Ducky — неавторизованная «клавиатура» не может печатать."
  tradeoffs_cons:
    - "Каждую новую легитимную клавиатуру придётся авторизовать кодом — небольшое неудобство при замене периферии."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от атак BadUSB"
  group: "Авторизация USB-устройств"
  name: "Запрет на использование экранной клавиатуры для авторизации USB-устройств"
  description: "Код авторизации нельзя ввести экранной клавиатурой — только уже авторизованным физическим устройством ввода."
  tradeoffs_pros:
    - "Закрывает обход: вредоносная «клавиатура» не сможет сама подтвердить свою авторизацию через экранный ввод."
  tradeoffs_cons:
    - "На устройствах только с сенсорным вводом авторизация новой клавиатуры станет невозможной."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от атак BadUSB"
  group: "Авторизация USB-устройств"
  name: "Максимальное количество попыток авторизации USB-устройства"
  description: "Число неверных вводов кода, после которого устройство временно блокируется."
  tradeoffs_pros:
    - "Исключает перебор кода автоматизированным устройством."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Защита от атак BadUSB"
  group: "Авторизация USB-устройств"
  name: "Тайм-аут при достижении максимального количества попыток(мин)"
  description: "Длительность блокировки устройства после исчерпания попыток авторизации."

# ─── Проверка съёмных дисков ─────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Проверка съемных дисков"
  group: "Авторизация USB-устройств"
  name: "Проверка съемных дисков"
  description: "Автоматическая антивирусная проверка съёмного диска при его подключении."
  purpose: "Съёмные носители — классический способ занести заражение в изолированный сегмент."
  tradeoffs_pros:
    - "Флешка проверяется до того, как пользователь начнёт открывать с неё файлы."
  tradeoffs_cons:
    - "Подключение больших дисков сопровождается длительной проверкой."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Проверка съемных дисков"
  group: "Авторизация USB-устройств"
  name: "Блокировать доступ к съемному диску во время проверки"
  description: "Пока идёт проверка, файлы на съёмном диске недоступны."
  tradeoffs_pros:
    - "Закрывает окно гонки: нельзя запустить заражённый файл до вердикта проверки."
  tradeoffs_cons:
    - "Пользователь ждёт окончания проверки — на больших носителях это минуты."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Тип проверки"
  group: "Авторизация USB-устройств"
  name: "Быстрая проверка"
  description: "Проверка съёмного диска по облегчённым параметрам: только опасные типы файлов, без глубокой распаковки."
  tradeoffs_pros:
    - "Минимальное время ожидания при подключении."
  tradeoffs_cons:
    - "Глубоко упакованные угрозы могут пройти — их поймает файловая защита при обращении."

- application_name: "KESL"
  application_version: "12.4"
  subcategory: "Тип проверки"
  group: "Авторизация USB-устройств"
  name: "Подробная проверка"
  description: "Полная проверка всех файлов съёмного диска, включая архивы."
  tradeoffs_pros:
    - "Максимальная полнота — носитель гарантированно чист после проверки."
  tradeoffs_cons:
    - "Долго: большая флешка с архивами может проверяться десятки минут."

