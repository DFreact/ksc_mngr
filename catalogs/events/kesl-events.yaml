# ─── Updates ─────────────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
  component: "Updates"
  name: "Databases updated successfully"
  severity: informational
  available_channels: [os-log-local]
  default_storage_days: 7
  description: "Antivirus databases were updated to the latest version."

- application_name: "KESL"
  application_version: "12.1"
  component: "Updates"
  name: "Databases out of date"
  severity: warning
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 7
  description: "Antivirus databases have not been updated within the configured threshold period."

- application_name: "KESL"
  application_version: "12.1"
  component: "Updates"
  name: "Databases update error"
  severity: functional_failure
  available_channels: [email, syslog, snmp, os-log-local]
  default_storage_days: 14
