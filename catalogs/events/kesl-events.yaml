- application_name: "KESL"
  application_version: "12.1"
  component: "Updates"
  name: "Databases rollback performed"
  severity: warning
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 14
  description: "Antivirus databases were rolled back to the previous version after an update error."

- application_name: "KESL"
  application_version: "12.1"
  component: "Updates"
  name: "Databases critically out of date"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 14
  description: "Antivirus databases are critically outdated (exceeded the critical threshold). Protection quality is severely degraded."

