# KESL 12.1 — Complete Events Catalog

# ─── File Threat Protection ───────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Malicious object detected"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "A malicious object was found during real-time file scanning and could not be automatically disinfected or was blocked."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Malicious object disinfected"
  severity: warning
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
  description: "A malicious object was successfully disinfected and the clean file remains accessible."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Malicious object deleted"
  severity: warning
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
  description: "A malicious object was deleted after disinfection failed."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Object not disinfected"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "A malicious object was detected but could not be disinfected, deleted, or blocked due to an error."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "File scan timeout exceeded"
  severity: warning
  available_channels: [syslog, os-log-local]
  default_storage_days: 14
  description: "Scanning a file exceeded the configured timeout and the file was skipped. The file was not checked for threats."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Protection component disabled"
  severity: functional_failure
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "File Threat Protection component was disabled — either by policy, user action, or an error."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Protection component error"
  severity: functional_failure
  available_channels: [email, syslog, snmp, os-log-local]
  default_storage_days: 30
  description: "File Threat Protection encountered an internal error and may not be functioning correctly."

- application_name: "KESL"
  application_version: "12.1"
  component: "File Threat Protection"
  name: "Scan of password-protected archive"
  severity: informational
  available_channels: [os-log-local]
  default_storage_days: 7
  description: "A password-protected archive was accessed. Contents could not be scanned. The event provides an audit trail."

