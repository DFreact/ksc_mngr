- application_name: "KESL"
  application_version: "12.1"
  component: "Device Control"
  name: "Device Control disabled"
  severity: functional_failure
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
  description: "Device Control component was disabled. Removable devices are no longer controlled."

# ─── Application Control ─────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
  component: "Application Control"
  name: "Application launch blocked"
  severity: warning
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
