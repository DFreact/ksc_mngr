- application_name: "KESL"
  application_version: "12.1"
  component: "Web Threat Protection"
  name: "Malicious web object detected in downloaded file"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "A malicious object was found in a file being downloaded via HTTP/HTTPS and was blocked."

- application_name: "KESL"
  application_version: "12.1"
  component: "Web Threat Protection"
  name: "Web Threat Protection disabled"
  severity: functional_failure
  available_channels: [email, syslog, snmp, os-log-local]
  default_storage_days: 30
  description: "Web Threat Protection component is disabled or encountered an error."

# ─── Network Threat Protection ────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
  component: "Network Threat Protection"
  name: "Network attack detected"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "An incoming network packet matched a known attack signature (exploit attempt, SYN flood, port scan)."

- application_name: "KESL"
  application_version: "12.1"
  component: "Network Threat Protection"
  name: "Attacking host blocked"
  severity: warning
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
  description: "The IP address of a detected attacker was automatically added to the block list."

- application_name: "KESL"
  application_version: "12.1"
  component: "Network Threat Protection"
  name: "Attacking host unblocked"
  severity: informational
  available_channels: [os-log-local]
  default_storage_days: 7
  description: "A previously blocked host was removed from the block list after the configured block duration expired."

- application_name: "KESL"
  application_version: "12.1"
  component: "Network Threat Protection"
  name: "Network Threat Protection disabled"
  severity: functional_failure
  available_channels: [email, syslog, snmp, os-log-local]
  default_storage_days: 30
  description: "Network Threat Protection (IDS) component was disabled or encountered an error."

# ─── Anti-Cryptor ────────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
  component: "Anti-Cryptor"
  name: "Mass encryption detected"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "Ransomware-style mass encryption pattern detected on a monitored network share."

- application_name: "KESL"
  application_version: "12.1"
  component: "Anti-Cryptor"
  name: "Mass encryption blocked"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "The source of mass encryption was blocked — network access from the attacking IP was cut off."

- application_name: "KESL"
  application_version: "12.1"
  component: "Anti-Cryptor"
  name: "Anti-Cryptor disabled"
  severity: functional_failure
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
  description: "Anti-Cryptor component was disabled. Network shares are no longer protected against ransomware."

# ─── Device Control ───────────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
