- application_name: "KESL"
  application_version: "12.1"
  component: "Application Control"
  name: "Application Control disabled"
  severity: functional_failure
  available_channels: [email, syslog, os-log-local]
  default_storage_days: 30
  description: "Application Control component was disabled. Application launch restrictions are no longer enforced."

# ─── Behavior Detection ──────────────────────────────────────────────────────

- application_name: "KESL"
  application_version: "12.1"
  component: "Behavior Detection"
  name: "Harmful activity detected"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "A running process exhibited behavior matching a Behavior Stream Signature (BSS) for malicious activity."

- application_name: "KESL"
  application_version: "12.1"
  component: "Behavior Detection"
  name: "Harmful activity blocked and rolled back"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local, os-log-server]
  default_storage_days: 30
  description: "A process exhibiting harmful behavior was terminated and its changes to the filesystem were rolled back."

- application_name: "KESL"
  application_version: "12.1"
  component: "Behavior Detection"
  name: "Rollback not possible"
  severity: critical
  available_channels: [email, syslog, snmp, os-log-local]
  default_storage_days: 30
  description: "A process was blocked for harmful behavior but its file system changes could not be rolled back. Manual remediation required."

- application_name: "KESL"
  application_version: "12.1"
  component: "Behavior Detection"
  name: "Behavior Detection disabled"
  severity: functional_failure
  available_channels: [email, syslog, snmp, os-log-local]
  default_storage_days: 30
  description: "Behavior Detection component was disabled. Runtime behavioral protection is no longer active."

