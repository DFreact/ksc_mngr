# Каталог векторов атак для защиты Linux-хостов (MITRE ATT&CK, тактики на русском).
#
# ВАЖНО: каталог намеренно ПОЛНЫЙ, а не подогнанный под возможности KESL.
# Он включает техники, которые EPP (Kaspersky Endpoint Security for Linux)
# закрыть НЕ может — чтобы в матрице были видны реальные пробелы, а не только
# то, чем можно похвастаться. Пробел под техникой = сигнал развернуть другой
# инструмент (EDR, PAM, сегментация сети, аудит), а не повод его прятать.
#
# Покрытие каждой техники задаётся отдельно в catalogs/control_mappings/ и
# считается по ДЕЙСТВУЮЩЕЙ политике: prevents / detects / partial, либо пусто
# (техника вне зоны действия KESL).

# ═══ Первоначальный доступ ═══════════════════════════════════════════════════

- name: Фишинговое вложение в почте
  tactic: Первоначальный доступ
  mitre_technique_ref: T1566.001
  description: >
    Вредонос доставляется вложением в письме (документ с макросом, PDF, архив).
    При открытии файл попадает на диск и исполняется.

- name: Фишинговая ссылка в письме
  tactic: Первоначальный доступ
  mitre_technique_ref: T1566.002
  description: >
    В письме — ссылка на вредоносный или фишинговый сайт; переход ведёт к
    загрузке payload или краже учётных данных.

- name: Drive-by компрометация через браузер
  tactic: Первоначальный доступ
  mitre_technique_ref: T1189
  description: >
    Посещение скомпрометированного сайта вызывает скрытую загрузку и запуск
    payload. Загрузка перехватывается веб-защитой; эксплуатация браузера в
    памяти — уже вне файловой проверки.

- name: Эксплуатация публично доступной службы
  tactic: Первоначальный доступ
  mitre_technique_ref: T1190
  description: >
    Атака на уязвимость сервиса, открытого наружу (веб-сервер, СУБД, RPC).
    Сетевая защита ловит известные сигнатуры атак; неизвестный эксплойт
    прикладного уровня проходит.

- name: Заражение через съёмный носитель
  tactic: Первоначальный доступ
  mitre_technique_ref: T1091
  description: >
    Вредонос заносится на изолированный хост через USB-накопитель:
    автозапуск или ручной запуск файла с носителя.

- name: Аппаратное внедрение (BadUSB / HID-инъекция)
  tactic: Первоначальный доступ
  mitre_technique_ref: T1200
  description: >
    Перепрошитое USB-устройство выдаёт себя за клавиатуру и вводит команды
    от имени пользователя (Rubber Ducky).

- name: Компрометация цепочки поставок ПО
  tactic: Первоначальный доступ
  mitre_technique_ref: T1195.002
  description: >
    Вредонос внедрён в легитимный пакет/образ из скомпрометированного
    репозитория. Известный вредонос ловится, целевая закладка — как правило нет.

- name: Доверенные отношения и внешний удалённый доступ
  tactic: Первоначальный доступ
  mitre_technique_ref: T1199
  description: >
    Проникновение через подрядчика, VPN, украденные ключи легитимного доступа.
    Вне зоны действия EPP — нужны PAM, MFA, сегментация и аудит доступа.

# ═══ Выполнение ══════════════════════════════════════════════════════════════

- name: Запуск вредоносного исполняемого файла пользователем
  tactic: Выполнение
  mitre_technique_ref: T1204.002
  description: >
    Пользователь запускает вредоносный бинарный файл. Файловая защита проверяет
    его при обращении; Контроль приложений в режиме allowlist не даёт запустить
    неизвестное.

- name: Вредоносный shell-скрипт (bash/sh)
  tactic: Выполнение
  mitre_technique_ref: T1059.004
  description: >
    Исполнение shell-команд и скриптов для загрузки payload, разведки, закрепления.
    Файл скрипта на диске проверяется; команды, вводимые интерактивно в оболочку,
    файловой проверкой не перехватываются.

- name: Вредоносный скрипт на Python/Perl
  tactic: Выполнение
  mitre_technique_ref: T1059.006
  description: >
    Интерпретируемый payload запускается легитимным интерпретатором. Allowlist
    контролирует бинарники, но не код внутри доверенного интерпретатора.

- name: Бесфайловое выполнение в памяти
  tactic: Выполнение
  mitre_technique_ref: T1620
  description: >
    Код загружается и исполняется прямо в памяти без записи на диск.
    Файловая проверка бессильна; шанс даёт только анализ поведения.

- name: Запуск вредоносного контейнера или образа
  tactic: Выполнение
  mitre_technique_ref: T1610
  description: >
    Развёртывание контейнера из образа с вредоносным содержимым.
    Мониторинг контейнеров проверяет образы и namespace.

- name: Злоупотребление легитимными системными утилитами (LOLBins)
  tactic: Выполнение
  mitre_technique_ref: T1218
  description: >
    Атакующий использует штатные утилиты (curl, wget, tar, ssh, systemctl) для
    вредоносных целей. Сами утилиты легитимны — файловая/allowlist-защита их
    пропускает; частично видит анализ поведения по цепочке действий.

# ═══ Закрепление ═════════════════════════════════════════════════════════════

- name: Закрепление через cron или systemd-таймер
  tactic: Закрепление
  mitre_technique_ref: T1053.003
  description: >
    Создание или изменение cron-задания / systemd-таймера для периодического
    запуска payload. Контроль целостности видит изменение файлов заданий,
    но не блокирует его.

- name: Автозапуск через systemd-юнит или init-скрипт
  tactic: Закрепление
  mitre_technique_ref: T1543.002
  description: >
    Регистрация вредоносной службы для запуска при загрузке. Отслеживается
    контролем целостности как изменение системных файлов.

- name: Подмена или добавление системного бинарника
  tactic: Закрепление
  mitre_technique_ref: T1554
  description: >
    Замена легитимной программы троянизированной версией. Контроль целостности
    фиксирует изменение; известный вредонос дополнительно ловит файловая защита.

- name: Вредоносный модуль ядра / руткит
  tactic: Закрепление
  mitre_technique_ref: T1547.006
  description: >
    Загрузка LKM-руткита, скрывающего процессы, файлы и соединения. Обнаруживается
    поведенческим анализом и контролем целостности; надёжной блокировки нет.

- name: Добавление SSH-ключа в authorized_keys
  tactic: Закрепление
  mitre_technique_ref: T1098.004
  description: >
    Дозапись публичного ключа атакующего для постоянного входа по SSH.
    Видно контролю целостности, только если каталог ~/.ssh под мониторингом.

- name: Создание учётной записи для закрепления
  tactic: Закрепление
  mitre_technique_ref: T1136.001
  description: >
    Создание локальной учётной записи или сервисного пользователя как запасного
    входа. Вне зоны действия EPP — нужен аудит /etc/passwd, EDR, HIDS.

- name: Подмена модулей аутентификации (PAM/NSS)
  tactic: Закрепление
  mitre_technique_ref: T1556.003
  description: >
    Модификация PAM для скрытого бэкдора аутентификации или сбора паролей.
    Обнаруживается контролем целостности при мониторинге соответствующих путей.

# ═══ Повышение привилегий ════════════════════════════════════════════════════

- name: Эксплуатация уязвимости ядра для повышения привилегий
  tactic: Повышение привилегий
  mitre_technique_ref: T1068
  description: >
    Локальный эксплойт ядра для получения root. Частично распознаётся анализом
    поведения по аномалиям; специализированной защиты уровня ядра у EPP нет.

- name: Злоупотребление sudo или setuid-битом
  tactic: Повышение привилегий
  mitre_technique_ref: T1548.001
  description: >
    Использование неверных настроек sudo или setuid-бинарников для эскалации.
    Вне зоны действия EPP — нужны аудит конфигурации, least privilege, EDR.

- name: Внедрение в процесс (process injection)
  tactic: Повышение привилегий
  mitre_technique_ref: T1055
  description: >
    Внедрение кода в адресное пространство чужого процесса (ptrace, /proc/mem).
    Распознаётся поведенческим анализом.

# ═══ Обход защиты ════════════════════════════════════════════════════════════

- name: Отключение или вмешательство в средства защиты
  tactic: Обход защиты
  mitre_technique_ref: T1562.001
  description: >
    Попытка остановить, выгрузить или испортить агент защиты. Самозащита KESL
    противодействует вмешательству в себя; чужие агенты она не прикрывает.

- name: Упакованное или обфусцированное ВПО
  tactic: Обход защиты
  mitre_technique_ref: T1027.002
  description: >
    Упаковщики и обфускаторы прячут код от сигнатур. Помогают эвристика и
    облачная репутация KSN, но гарантии нет.

- name: Маскировка под легитимный процесс или файл
  tactic: Обход защиты
  mitre_technique_ref: T1036.005
  description: >
    Вредонос называется как системный файл/процесс. Проверка по содержимому,
    а не по имени, частично нейтрализует приём.

- name: Удаление индикаторов и очистка журналов
  tactic: Обход защиты
  mitre_technique_ref: T1070.002
  description: >
    Стирание системных логов и истории для сокрытия следов. Видно контролю
    целостности при мониторинге логов; предотвращения нет.

- name: Изменение прав и атрибутов файлов для обхода
  tactic: Обход защиты
  mitre_technique_ref: T1222.002
  description: >
    Смена владельца/прав/атрибутов, отключение исполняемости приманок и т.п.
    Вне зоны действия EPP — нужен аудит файловых операций (auditd, EDR).

# ═══ Доступ к учётным данным ═════════════════════════════════════════════════

- name: Дамп учётных данных ОС (/etc/shadow, память)
  tactic: Доступ к учётным данным
  mitre_technique_ref: T1003.008
  description: >
    Чтение хешей паролей из /etc/shadow или дамп секретов из памяти процессов.
    Инструменты-дамперы частично ловятся как riskware; сам доступ к файлам —
    в основном вне зоны действия EPP.

- name: Кража SSH-ключей и незащищённых секретов
  tactic: Доступ к учётным данным
  mitre_technique_ref: T1552.004
  description: >
    Сбор приватных ключей, токенов и паролей из файлов и переменных окружения.
    Вне зоны действия EPP — нужны DLP, аудит доступа, управление секретами.

- name: Подбор паролей (brute force)
  tactic: Доступ к учётным данным
  mitre_technique_ref: T1110
  description: >
    Перебор паролей к SSH и другим службам. Вне зоны действия EPP — нужны
    fail2ban, блокировки на стороне служб, MFA, мониторинг аутентификации.

- name: Перехват ввода (кейлоггер)
  tactic: Доступ к учётным данным
  mitre_technique_ref: T1056.001
  description: >
    Перехват нажатий клавиш для кражи паролей. Поведенческий анализ частично
    распознаёт; аппаратный перехват через HID закрывается защитой от BadUSB.

# ═══ Разведка ════════════════════════════════════════════════════════════════

- name: Разведка системы и процессов
  tactic: Разведка
  mitre_technique_ref: T1082
  description: >
    Сбор сведений о хосте, ОС, процессах и пользователях штатными командами.
    Вне зоны действия EPP — обнаруживается EDR/поведенческой аналитикой SIEM.

- name: Сканирование сетевых служб
  tactic: Разведка
  mitre_technique_ref: T1046
  description: >
    Поиск открытых портов и уязвимых сервисов в сети с захваченного хоста.
    Инструменты сканирования частично распознаются как riskware; сам трафик
    разведки — вне зоны действия EPP.

- name: Обнаружение учётных записей и групп
  tactic: Разведка
  mitre_technique_ref: T1087.001
  description: >
    Перечисление локальных и доменных учётных записей для планирования атаки.
    Вне зоны действия EPP — нужен аудит и корреляция в SIEM/EDR.

# ═══ Боковое перемещение ═════════════════════════════════════════════════════

- name: Перемещение через SSH и удалённые службы
  tactic: Боковое перемещение
  mitre_technique_ref: T1021.004
  description: >
    Использование легитимного SSH с украденными ключами/паролями для перехода
    на соседние хосты. Сетевой экран ограничивает направления; сам легитимный
    сеанс EPP не отличает от нормального — нужна сегментация и PAM.

- name: Заражение общих сетевых ресурсов
  tactic: Боковое перемещение
  mitre_technique_ref: T1080
  description: >
    Размещение вредоноса в общих папках SMB/NFS для заражения других хостов.
    Файловая защита ловит вредонос при обращении к ресурсу.

- name: Распространение шифровальщика по SMB/NFS
  tactic: Боковое перемещение
  mitre_technique_ref: T1021.002
  description: >
    Шифровальщик с заражённого хоста массово шифрует файлы на сетевых ресурсах.
    Защита от шифрования обнаруживает паттерн и отсекает источник.

# ═══ Сбор данных ═════════════════════════════════════════════════════════════

- name: Сбор и архивирование данных с хоста
  tactic: Сбор данных
  mitre_technique_ref: T1560.001
  description: >
    Поиск и упаковка ценных файлов перед кражей. Вне зоны действия EPP —
    нужны DLP и поведенческая аналитика.

- name: Перехват данных с камеры и микрофона
  tactic: Сбор данных
  mitre_technique_ref: T1123
  description: >
    Несанкционированная запись с периферии. Контроль устройств может ограничить
    доступ к камерам, сканерам и звуковым устройствам.

# ═══ Командное управление ════════════════════════════════════════════════════

- name: Загрузка инструментов на хост (ingress tool transfer)
  tactic: Командное управление
  mitre_technique_ref: T1105
  description: >
    Докачка дополнительных инструментов с сервера атакующего. Известный вредонос
    блокируется веб- и файловой защитой; произвольная докачка легитимными
    утилитами — лишь частично.

- name: Управление по прикладному протоколу (HTTP/HTTPS)
  tactic: Командное управление
  mitre_technique_ref: T1071.001
  description: >
    C2-канал маскируется под обычный веб-трафик. Известные C2-адреса блокируются
    веб-защитой; кастомный C2 в TLS — в основном вне зоны действия EPP.

- name: Шифрованный или нестандартный канал C2
  tactic: Командное управление
  mitre_technique_ref: T1573
  description: >
    Управление через собственное шифрование, DNS-туннель, нестандартные порты.
    Частично ограничивается egress-правилами сетевого экрана; распознавания
    самого канала у EPP нет — нужен NDR/NGFW.

- name: Проксирование и туннелирование трафика
  tactic: Командное управление
  mitre_technique_ref: T1090
  description: >
    Прокладка туннелей и прокси для сокрытия C2 и разведки. Вне зоны действия
    EPP — нужны сетевые средства (NDR, NGFW, анализ потоков).

# ═══ Кража данных ════════════════════════════════════════════════════════════

- name: Кража данных на съёмный носитель
  tactic: Кража данных
  mitre_technique_ref: T1052.001
  description: >
    Копирование чувствительных данных на USB для выноса из периметра.
    Контроль устройств блокирует запись на неразрешённые носители.

- name: Утечка по альтернативному сетевому каналу
  tactic: Кража данных
  mitre_technique_ref: T1048
  description: >
    Отправка данных наружу по нестандартному протоколу/порту. Egress-правила
    сетевого экрана частично ограничивают; полноценно — задача DLP/NDR.

- name: Утечка через веб-сервис или облако
  tactic: Кража данных
  mitre_technique_ref: T1567.002
  description: >
    Выгрузка данных в облачные хранилища и веб-сервисы. Веб-Контроль частично
    ограничивает доступ к категориям; контроль содержимого — задача DLP.

# ═══ Воздействие ═════════════════════════════════════════════════════════════

- name: Шифрование локальных файлов шифровальщиком
  tactic: Воздействие
  mitre_technique_ref: T1486
  description: >
    Массовое шифрование файлов на локальной ФС. Анализ поведения с откатом
    завершает процесс и восстанавливает изменённые файлы.

- name: Шифрование файлов на сетевых ресурсах
  tactic: Воздействие
  mitre_technique_ref: T1486.001
  description: >
    Шифрование данных в общих папках с удалённого заражённого хоста.
    Защита от шифрования обнаруживает и блокирует источник.

- name: Уничтожение данных (wiper)
  tactic: Воздействие
  mitre_technique_ref: T1485
  description: >
    Необратимое удаление файлов, таблиц разделов или прошивок. Анализ поведения
    частично распознаёт и прерывает деструктивную активность.

- name: Уничтожение резервных копий и запрет восстановления
  tactic: Воздействие
  mitre_technique_ref: T1490
  description: >
    Удаление снапшотов и бэкапов перед шифрованием. Вне зоны действия EPP —
    нужны неизменяемые (immutable) бэкапы и разделение прав доступа к ним.

- name: Скрытый майнинг криптовалюты
  tactic: Воздействие
  mitre_technique_ref: T1496
  description: >
    Захват вычислительных ресурсов под майнинг. Известные майнеры ловятся
    файловой защитой и как riskware; кастомные — по поведению (аномальная нагрузка).

- name: Остановка служб и отказ в обслуживании
  tactic: Воздействие
  mitre_technique_ref: T1489
  description: >
    Остановка критичных сервисов для нарушения работы. Вне зоны действия EPP —
    нужны мониторинг доступности и защита на уровне оркестрации/служб.
